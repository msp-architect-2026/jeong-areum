version: '3.8'

services:
  backend:
    build:
      context: ./tripdealBackend/tripdeal
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: always
    networks:
      - tripdeal-net

  frontend: 
    build:
      context: ./tripdealFrontend
      args:
        - NEXT_PUBLIC_API_URL=http://backend:8080
    ports:
      - "3000:3000"
    restart: always  # ← 일감에 맞게 유지
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tripdeal-net

networks:
  tripdeal-net:
    driver: bridge