backend:
  image:
    repository: armddi/tripdeal-backend
    tag: "v14"
  replicas: 2
  port: 8080
  resources:
    requests:
      memory: "128Mi"
      cpu: "200m"
    limits:
      memory: "256Mi"
      cpu: "500m"

frontend:
  image:
    repository: armddi/tripdeal-frontend
    tag: "dev"
  replicas: 2
  port: 3000
  resources:
    requests:
      memory: "64Mi"
      cpu: "200m"

redis:
  image:
    repository: redis
    tag: alpine
  port: 6379

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50
