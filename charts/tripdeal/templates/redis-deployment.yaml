apiVersion: apps/v1
kind: Deployment
metadata:
  name: tripdeal-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tripdeal-redis
  template:
    metadata:
      labels:
        app: tripdeal-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
          ports:
            - containerPort: {{ .Values.redis.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: tripdeal-redis
spec:
  selector:
    app: tripdeal-redis
  ports:
    - port: {{ .Values.redis.port }}
      targetPort: {{ .Values.redis.port }}
  type: ClusterIP
